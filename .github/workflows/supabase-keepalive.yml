name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 8 */3 * *"  # ogni 3 giorni alle 08:00 UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase
        run: |
          curl -s \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/rest/v1/componenti?select=id&limit=1"
